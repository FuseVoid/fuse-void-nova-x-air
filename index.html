<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuse Void NOVA-X AIR</title>
    <meta name="description" content="NOVA-X AIR — Launchpad Pro MK3 and Ableton Live MIDI control, 8×8 session grid, 4-track sequencer, 126 project slots.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="site.css">
</head>
<body>
    <div id="boot-error" hidden></div>
    <header class="site-header">
        <img class="site-header__mark" src="favicon.png" alt="Fuse Void">
        <div class="site-header__text">
            <span class="site-header__logo">Fuse Void</span>
            <span class="site-header__tag">NOVA-X AIR</span>
        </div>
    </header>

    <nav class="site-actions" aria-label="Site links">
        <a href="#" class="site-action" id="link-app-store">App Store</a>
        <a href="mailto:fusevoidmusic@gmail.com" class="site-action" id="link-support">Support</a>
    </nav>

    <div class="scroll-spacer" id="scroll-spacer"></div>

    <section class="site-end" id="site-end" aria-label="Site information">
        <footer class="site-footer">
            <p class="site-footer__privacy">Fuse Void is an offline-first engine. We do not use cookies. We do not track you. Your creativity is yours alone.</p>
            <a href="mailto:fusevoidmusic@gmail.com" class="site-footer__email">fusevoidmusic@gmail.com</a>
            <div class="site-footer__social">
                <a href="#" class="site-footer__social-link" id="link-instagram" aria-label="Instagram" target="_blank" rel="noopener noreferrer">

            </div>
            <p class="site-footer__copy">© FUSE VOID MUSIC ENGINE</p>
        </footer>
    </section>

    <canvas id="scene-canvas" aria-hidden="true"></canvas>

    <aside class="hint hint--left scene-chrome">
        <span class="hint__circle">↻</span>
        <span class="hint__text">Drag a ring<br>Click label to read</span>
    </aside>
    <aside class="hint hint--right scene-chrome">
        <span class="hint__circle">↓</span>
        <span class="hint__text">Scroll to explore<br>more rings</span>
    </aside>

    <div class="scroll-progress scene-chrome">
        <div class="scroll-progress__bar" id="scroll-bar"></div>
    </div>

    <div class="focus-layer" id="focus-layer" hidden>
        <button type="button" class="focus-layer__backdrop" id="focus-close" aria-label="Close"></button>
        <article class="focus-card" id="focus-card">
            <p class="focus-card__tag" id="focus-tag"></p>
            <h2 class="focus-card__title" id="focus-title"></h2>
            <p class="focus-card__stat" id="focus-stat"></p>
            <p class="focus-card__stat-label" id="focus-stat-label"></p>
            <hr class="focus-card__rule">
            <p class="focus-card__body" id="focus-body"></p>
            <ul class="focus-card__tags" id="focus-tags"></ul>
        </article>
    </div>

    <script type="module" src="cylinder-scene.js"></script>
    <script>
        const SITE_LINKS = {
            appStore: '#',
            instagram: '#',
            youtube: '#',
        };
        document.getElementById('link-app-store').href = SITE_LINKS.appStore;
        document.getElementById('link-instagram').href = SITE_LINKS.instagram;
        document.getElementById('link-youtube').href = SITE_LINKS.youtube;
    </script>
</body>
</html>
